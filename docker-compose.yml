version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aapadbandhav_app
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DB_DIALECT=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
    volumes:
      - app_uploads:/app/backend/uploads
      - app_logs:/app/backend/logs
      - frontend_dist:/app/frontend/dist
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - backend_net
      - frontend_net
      - iot_net

  db:
    image: postgres:16-alpine
    container_name: aapadbandhav_db
    restart: always
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=${DB_NAME:-aapadbandhav_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - db_backups:/var/lib/postgresql/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: aapadbandhav_redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: aapadbandhav_mqtt
    restart: always
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    ports:
      - "1883:1883"
    entrypoint: >
      sh -c "
        touch /mosquitto/config/passwd
        mosquitto_passwd -b /mosquitto/config/passwd \"$${MQTT_USER:-server}\" \"$${MQTT_PASSWORD:-password123}\"
        mosquitto_passwd -b /mosquitto/config/passwd \"$${MQTT_NODE_USER:-vehicle_node}\" \"$${MQTT_NODE_PASSWORD:-NodeSecurePass2026}\"
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "
    networks:
      - iot_net

  nginx:
    image: nginx:stable-alpine
    container_name: aapadbandhav_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - app_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - frontend_net

volumes:
  pg_data:
  db_backups:
  redis_data:
  mqtt_data:
  mqtt_logs:
  app_uploads:
  app_logs:
  frontend_dist:

networks:
  frontend_net:
  backend_net:
  iot_net:
