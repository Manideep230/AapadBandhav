# AapadBandhav Coolify Deployment Configuration
version: "1.0.0"
type: "docker-compose"
name: "aapadbandhav"
description: "Smart Accident Detection & Emergency Response Platform"

settings:
  # Instructs Coolify to use docker-compose.yml at the repository root
  compose_file_path: "docker-compose.yml"
  # Enable automatic builds on push to main branch
  auto_deploy: true

# Volumes mapped to persistent storage in Coolify
volumes:
  - name: "pg_data"
    dest: "/var/lib/postgresql/data"
  - name: "db_backups"
    dest: "/var/lib/postgresql/backups"
  - name: "redis_data"
    dest: "/data"
  - name: "mqtt_data"
    dest: "/mosquitto/data"
  - name: "mqtt_logs"
    dest: "/mosquitto/log"
  - name: "app_uploads"
    dest: "/app/backend/uploads"
  - name: "app_logs"
    dest: "/app/backend/logs"
  - name: "frontend_dist"
    dest: "/app/frontend/dist"

# Required variables to be defined in Coolify Dashboard
env_variables:
  - key: "PORT"
    value: "5000"
    is_public: true
  - key: "DB_NAME"
    value: "aapadbandhav_db"
  - key: "DB_USER"
    value: "postgres"
  - key: "DB_PASSWORD"
    value: "generate_random_password"
  - key: "MQTT_USER"
    value: "server"
  - key: "MQTT_PASSWORD"
    value: "generate_random_password"
  - key: "MQTT_NODE_USER"
    value: "vehicle_node"
  - key: "MQTT_NODE_PASSWORD"
    value: "generate_random_password"
  - key: "JWT_SECRET"
    value: "generate_random_64_char_secret"
