# Redis configuration file for AapadBandhav production environment

# Bind to all network interfaces inside the container
bind 0.0.0.0

# Accept connections on the specified port
port 6379

# Close the connection after a client is idle for N seconds (0 to disable)
timeout 0

# TCP keepalive.
tcp-keepalive 300

# Run Redis in the foreground (Docker will manage the daemonization)
daemonize no

# Specify the server verbosity level.
loglevel notice

# Set the number of databases.
databases 16

# Persistence settings
# Save the DB on disk:
#   save 900 1 (900 seconds/15 min if at least 1 key changed)
#   300 10 (300 seconds/5 min if at least 10 keys changed)
#   60 10000 (60 seconds/1 min if at least 10000 keys changed)
save 900 1
save 300 10
save 60 10000

# Enable Append Only Mode (AOF) for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory Management
# Limit maximum memory usage to 256MB (scalable based on host memory)
maxmemory 256mb
maxmemory-policy allkeys-lru
